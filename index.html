<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/style.css">
  <title>Login | Secret by Zax</title>
</head>

<body>

  <div class="card" id="loginCard">
    <div class="card-header">
      <p class="eyebrow">secret by zax</p>
      <h1 class="card-title">masuk dulu,<br><em>baru boleh lihat.</em></h1>
    </div>

    <form id="loginForm" class="login_form" novalidate>
      <div class="field">
        <input
          type="text"
          id="username"
          placeholder="username"
          autocomplete="off"
          spellcheck="false"
        />
      </div>

      <div class="field">
        <input
          type="password"
          id="password"
          placeholder="password"
        />
        <button type="button" class="toggle-pw" id="togglePw" aria-label="Tampilkan password">👁</button>
      </div>

      <div class="form-error" id="formError">username atau password salah.</div>

      <button type="submit" class="btn-submit" id="loginBtn">masuk →</button>
    </form>

    <div class="hint-wrap">
      <div class="hint-container">
        <button class="hint-trigger" id="hintTrigger">butuh bantuan? →</button>
        <div class="hint-popover" id="hintPopover">
          <div class="hint-popover-label">info login</div>
          <div class="hint-row" data-field="username" data-value="zaxganteng">
            <div class="hint-row-left">
              <span class="hint-row-type">username</span>
              <span class="hint-row-value">zaxganteng</span>
            </div>
            <span class="hint-copy-icon">⎘</span>
          </div>
          <div class="hint-row" data-field="password" data-value="ayamcoding">
            <div class="hint-row-left">
              <span class="hint-row-type">password</span>
              <span class="hint-row-value">ayamcoding</span>
            </div>
            <span class="hint-copy-icon">⎘</span>
          </div>
          <div class="hint-arrow"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="copy-toast" id="copyToast"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.5/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="./scripts/index.js"></script>

</body>

</html>
