<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <title>Secret by Zax | Login</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #0f0f1a 100%);
      font-family: 'Poppins', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      position: relative;
    }

    /* Efek grain / noise */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 1;
    }

    .login_container {
      position: relative;
      z-index: 2;
      background: rgba(25, 25, 35, 0.65);
      backdrop-filter: blur(12px);
      border-radius: 32px;
      padding: 2.2rem 2rem;
      width: 100%;
      max-width: 460px;
      border: 1px solid rgba(232, 201, 127, 0.15);
      box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3), 0 0 0 0.5px rgba(232, 201, 127, 0.1) inset;
      transition: transform 0.2s ease;
    }

    .login_container:hover {
      transform: translateY(-2px);
    }

    h2 {
      font-size: 1.9rem;
      font-weight: 500;
      background: linear-gradient(135deg, #f4f1ea 0%, #e8c97f 100%);
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.5rem;
      letter-spacing: -0.3px;
    }

    .greeting-sub {
      font-size: 0.8rem;
      color: rgba(244, 241, 234, 0.5);
      margin-bottom: 2rem;
      border-left: 2px solid #e8c97f;
      padding-left: 0.75rem;
    }

    .login_form {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .login_form input {
      background: rgba(20, 20, 28, 0.8);
      border: 1px solid rgba(232, 201, 127, 0.2);
      padding: 0.9rem 1.2rem;
      border-radius: 20px;
      font-family: 'Poppins', sans-serif;
      font-size: 0.9rem;
      color: #f4f1ea;
      transition: all 0.2s ease;
      outline: none;
    }

    .login_form input:focus {
      border-color: #e8c97f;
      box-shadow: 0 0 0 3px rgba(232, 201, 127, 0.1);
      background: rgba(30, 30, 40, 0.9);
    }

    .login_form input::placeholder {
      color: rgba(244, 241, 234, 0.3);
    }

    .login_form button {
      background: linear-gradient(90deg, #e8c97f 0%, #d4b06a 100%);
      border: none;
      padding: 0.9rem;
      border-radius: 28px;
      font-family: 'Poppins', sans-serif;
      font-weight: 600;
      font-size: 1rem;
      color: #0a0a0a;
      cursor: pointer;
      transition: all 0.2s ease;
      margin-top: 0.5rem;
      letter-spacing: 0.5px;
    }

    .login_form button:hover {
      transform: scale(0.98);
      box-shadow: 0 4px 12px rgba(232, 201, 127, 0.3);
    }

    .login_form button:active {
      transform: scale(0.96);
    }

    /* DESKRIPSI LAMA YANG DI GANTI JADI MODERN */
    .old-description {
      display: none;
    }

    /* === BOX REKOMENDASI ELEGAN (HINT INTERAKTIF) === */
    .hint-section {
      margin-top: 2rem;
    }

    .hint-label {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: rgba(232, 201, 127, 0.6);
      margin-bottom: 0.75rem;
    }

    .hint-label span {
      font-size: 1rem;
    }

    .hint-card {
      background: rgba(15, 15, 22, 0.7);
      backdrop-filter: blur(4px);
      border-radius: 24px;
      padding: 0.2rem;
      border: 1px solid rgba(232, 201, 127, 0.2);
      transition: all 0.2s;
    }

    .hint-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.9rem 1.2rem;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 22px;
      cursor: pointer;
      transition: all 0.2s ease;
      border-bottom: 1px solid rgba(232, 201, 127, 0.1);
    }

    .hint-item:last-child {
      border-bottom: none;
    }

    .hint-item:hover {
      background: rgba(232, 201, 127, 0.08);
      transform: translateX(4px);
    }

    .hint-item:active {
      transform: scale(0.99);
    }

    .hint-left {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .hint-title {
      font-size: 0.75rem;
      color: rgba(244, 241, 234, 0.5);
      letter-spacing: 0.3px;
    }

    .hint-value {
      font-size: 0.9rem;
      font-weight: 500;
      font-family: 'Monaco', 'Courier New', monospace;
      color: #e8c97f;
      word-break: break-all;
    }

    .copy-icon {
      font-size: 1.1rem;
      opacity: 0.5;
      transition: opacity 0.2s;
    }

    .hint-item:hover .copy-icon {
      opacity: 1;
    }

    .toast-message {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: rgba(232, 201, 127, 0.95);
      color: #0a0a0a;
      padding: 0.6rem 1.2rem;
      border-radius: 40px;
      font-size: 0.8rem;
      font-weight: 500;
      opacity: 0;
      transition: all 0.2s ease;
      pointer-events: none;
      z-index: 1000;
      white-space: nowrap;
      backdrop-filter: blur(8px);
      font-family: monospace;
    }

    .toast-message.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 480px) {
      .login_container {
        padding: 1.6rem;
      }
      h2 {
        font-size: 1.6rem;
      }
      .hint-value {
        font-size: 0.8rem;
      }
      .toast-message {
        white-space: normal;
        max-width: 80vw;
        text-align: center;
      }
    }
  </style>
</head>

<body>
  <div class="login_container">
    <h2>secret area</h2>
    <div class="greeting-sub">// hanya untuk yang tahu</div>

    <form id="loginForm" class="login_form">
      <input type="text" id="username" placeholder="username" autocomplete="off" />
      <input type="password" id="password" placeholder="password" />
      <button type="submit" id="loginBtn">↳ masuk</button>
    </form>

    <!-- BOX HINT INTERAKTIF (username & password rekomendasi) -->
    <div class="hint-section">
      <div class="hint-label">
        <span>🔐</span> HINT · klik untuk copy
      </div>
      <div class="hint-card">
        <div class="hint-item" data-type="username" data-value="zaxganteng">
          <div class="hint-left">
            <div class="hint-title">username</div>
            <div class="hint-value" id="hintUsername">zaxganteng</div>
          </div>
          <div class="copy-icon">📋</div>
        </div>
        <div class="hint-item" data-type="password" data-value="zaxganteng">
          <div class="hint-left">
            <div class="hint-title">password</div>
            <div class="hint-value" id="hintPassword">zaxganteng</div>
          </div>
          <div class="copy-icon">📋</div>
        </div>
      </div>
      <div style="font-size: 0.65rem; text-align: center; margin-top: 0.8rem; color: rgba(244,241,234,0.3);">
        ✦ rahasia hanya untuk kamu ✦
      </div>
    </div>
  </div>

  <div id="toastMsg" class="toast-message">✓ tersalin</div>

  <!-- Library pendukung -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.5/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  
  <script>
    // ========== LOGIC FORM ==========
    const form = document.getElementById('loginForm');
    
    function validateForm() {
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const validUsername = "zaxganteng";
      const validPassword = "zaxganteng";
    
      if (username === validUsername && password === validPassword) {
        localStorage.setItem('loginSuccess', 'true');
        Swal.fire({
          icon: "success",
          title: "Berhasil masuk",
          text: "Selamat datang!",
          showConfirmButton: false,
          timer: 1500,
          background: "#181b24",
          color: "#f4f1ea",
          iconColor: "#e8c97f",
          customClass: { popup: "swal-dark" },
        }).then(() => {
          window.location.href = "birthday.html";
        });
      } else {
        Swal.fire({
          icon: "error",
          title: "Gagal masuk",
          text: "Periksa kembali username dan password Anda.",
          confirmButtonText: "Coba lagi",
          confirmButtonColor: "#e8c97f",
          background: "#181b24",
          color: "#f4f1ea",
          customClass: { popup: "swal-dark" },
        });
      }
    }
    
    if (form) {
      form.addEventListener('submit', function (e) {
        e.preventDefault();
        validateForm();
      });
    }
    
    // ========== HINT INTERAKTIF (klik untuk copy + auto isi form) ==========
    const hintItems = document.querySelectorAll('.hint-item');
    const toast = document.getElementById('toastMsg');
    
    function showToast(text) {
      toast.textContent = text || '✓ tersalin';
      toast.classList.add('show');
      setTimeout(() => {
        toast.classList.remove('show');
      }, 1500);
    }
    
    hintItems.forEach(item => {
      item.addEventListener('click', (e) => {
        const type = item.getAttribute('data-type');   // 'username' atau 'password'
        const value = item.getAttribute('data-value');
        
        if (type && value) {
          // 1. Copy ke clipboard
          navigator.clipboard.writeText(value).then(() => {
            showToast(`✓ ${type} tersalin`);
          }).catch(() => {
            showToast(`⚠️ copy manual ya`);
          });
          
          // 2. Isi otomatis ke form login (biar makin praktis)
          const inputField = document.getElementById(type);
          if (inputField) {
            inputField.value = value;
            // Efek highlight sebentar
            inputField.style.transition = '0.1s';
            inputField.style.borderColor = '#e8c97f';
            setTimeout(() => {
              inputField.style.borderColor = '';
            }, 400);
          }
          
          // Bonus: animasi halus pakai gsap (kalau ada)
          if (window.gsap) {
            gsap.to(item, { scale: 0.98, duration: 0.1, yoyo: true, repeat: 1 });
          }
        }
      });
    });
    
    // Animasi masuk (fade + scale)
    if (window.gsap) {
      gsap.from('.login_container', { opacity: 0, y: 30, duration: 0.6, ease: 'power2.out' });
      gsap.from('.hint-section', { opacity: 0, y: 20, duration: 0.5, delay: 0.2 });
    }
  </script>
</body>

</html>
