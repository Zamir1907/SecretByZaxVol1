<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles/style.css">
  <title>Login | Secret by Zax</title>

  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --bg:       #09090f;
      --surface:  rgba(18, 18, 28, 0.72);
      --gold:     #e8c97f;
      --gold-dim: rgba(232, 201, 127, 0.18);
      --text:     #ece8df;
      --muted:    rgba(236, 232, 223, 0.45);
      --border:   rgba(232, 201, 127, 0.14);
      --danger:   #ff6b6b;
      --radius:   20px;
    }

    html, body {
      height: 100%;
    }

    body {
      background: var(--bg);
      font-family: 'Poppins', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1.5rem;
      overflow: hidden;
    }

    /* ambient glow */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 50% 0%, rgba(232,201,127,0.07) 0%, transparent 70%),
        radial-gradient(ellipse 40% 30% at 80% 100%, rgba(139,92,246,0.05) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    /* ===== CARD ===== */
    .card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 400px;
      background: var(--surface);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 2.4rem 2rem 2rem;
      box-shadow:
        0 32px 64px rgba(0,0,0,0.45),
        0 0 0 0.5px rgba(232,201,127,0.08) inset;
      opacity: 0;
      transform: translateY(24px);
    }

    /* ===== HEADER ===== */
    .card-header {
      margin-bottom: 2rem;
    }

    .eyebrow {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--gold);
      opacity: 0.7;
      margin-bottom: 0.55rem;
    }

    .card-title {
      font-size: 1.75rem;
      font-weight: 500;
      color: var(--text);
      letter-spacing: -0.03em;
      line-height: 1.2;
    }

    .card-title em {
      font-style: normal;
      background: linear-gradient(110deg, var(--text) 30%, var(--gold));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ===== FORM ===== */
    .login_form {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .field {
      position: relative;
    }

    .field input {
      width: 100%;
      background: rgba(0,0,0,0.28);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.85rem 1.1rem;
      font-family: 'Poppins', sans-serif;
      font-size: 0.9rem;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .field input::placeholder {
      color: var(--muted);
    }

    .field input:focus {
      border-color: rgba(232,201,127,0.5);
      box-shadow: 0 0 0 3px rgba(232,201,127,0.08);
    }

    .field input.error {
      border-color: var(--danger);
      box-shadow: 0 0 0 3px rgba(255,107,107,0.08);
    }

    /* toggle password */
    .toggle-pw {
      position: absolute;
      right: 1rem;
top: 50%;
transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1rem;
      color: var(--muted);
      transition: color 0.2s;
      padding: 0;
      line-height: 1;
    }

    .toggle-pw:hover { color: var(--text); }

    /* submit */
    .btn-submit {
      margin-top: 0.5rem;
      width: 100%;
      padding: 0.9rem;
      background: linear-gradient(110deg, #e8c97f, #c9a450);
      border: none;
      border-radius: var(--radius);
      font-family: 'Poppins', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      color: #0a0a0a;
      cursor: pointer;
      letter-spacing: 0.02em;
      transition: opacity 0.2s, transform 0.15s;
    }

    .btn-submit:hover  { opacity: 0.92; }
    .btn-submit:active { transform: scale(0.98); }
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }

    /* error hint */
    .form-error {
      font-size: 0.72rem;
      color: var(--danger);
      margin-top: 0.4rem;
      padding-left: 0.2rem;
      min-height: 1rem;
      opacity: 0;
      transform: translateY(-4px);
      transition: opacity 0.2s, transform 0.2s;
    }

    .form-error.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* ===== FOOTER TEXT ===== */
    .card-footer {
      margin-top: 1.6rem;
      text-align: center;
      font-size: 0.68rem;
      color: var(--muted);
      letter-spacing: 0.04em;
    }

    .card-footer span {
      color: rgba(232,201,127,0.5);
    }

    /* ===== HINT POPOVER ===== */
    .hint-wrap {
      margin-top: 1.1rem;
      display: flex;
      justify-content: center;
    }

    .hint-container {
      position: relative;
      display: inline-flex;
      justify-content: center;
    }

    .hint-trigger {
      background: none;
      border: none;
      font-family: 'Poppins', sans-serif;
      font-size: 0.72rem;
      color: var(--muted);
      cursor: pointer;
      padding: 0.3rem 0.5rem;
      border-radius: 8px;
      transition: color 0.2s;
      letter-spacing: 0.02em;
    }

    .hint-trigger:hover { color: var(--gold); }

    .hint-popover {
      position: absolute;
      bottom: calc(100% + 12px);
      left: 50%;
      transform: translateX(-50%) translateY(6px);
      background: rgba(12, 12, 20, 0.97);
      border: 1px solid rgba(232,201,127,0.18);
      border-radius: 16px;
      padding: 1rem 1.1rem;
      width: 210px;
      box-shadow: 0 20px 48px rgba(0,0,0,0.55);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease, transform 0.2s ease;
      z-index: 20;
    }

    .hint-popover.open {
      opacity: 1;
      pointer-events: auto;
      transform: translateX(-50%) translateY(0);
    }

    .hint-popover-label {
      font-size: 0.58rem;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      color: var(--gold);
      opacity: 0.55;
      margin-bottom: 0.65rem;
      font-family: 'DM Mono', monospace;
    }

    .hint-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.5rem 0.4rem;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s;
      border-bottom: 1px solid rgba(232,201,127,0.07);
    }

    .hint-row:last-of-type { border-bottom: none; }
    .hint-row:hover { background: rgba(232,201,127,0.06); }

    .hint-row-left { display: flex; flex-direction: column; gap: 2px; }

    .hint-row-type {
      font-size: 0.56rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .hint-row-value {
      font-family: 'DM Mono', monospace;
      font-size: 0.8rem;
      color: var(--text);
    }

    .hint-copy-icon {
      font-size: 0.72rem;
      opacity: 0.35;
      transition: opacity 0.15s;
    }

    .hint-row:hover .hint-copy-icon { opacity: 1; }

    /* panah bawah popover */
    .hint-arrow {
      position: absolute;
      bottom: -5px;
      left: 50%;
      transform: translateX(-50%) rotate(45deg);
      width: 9px;
      height: 9px;
      background: rgba(12,12,20,0.97);
      border-right: 1px solid rgba(232,201,127,0.18);
      border-bottom: 1px solid rgba(232,201,127,0.18);
    }

    /* toast copy */
    .copy-toast {
      position: fixed;
      bottom: 26px;
      left: 50%;
      transform: translateX(-50%) translateY(8px);
      background: rgba(232,201,127,0.95);
      color: #0a0a0a;
      font-size: 0.72rem;
      font-weight: 600;
      font-family: 'DM Mono', monospace;
      padding: 0.42rem 1rem;
      border-radius: 40px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.18s, transform 0.18s;
      z-index: 100;
      white-space: nowrap;
    }

    .copy-toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 420px) {
      .card {
        padding: 2rem 1.5rem 1.75rem;
        border-radius: 24px;
      }
      .card-title { font-size: 1.5rem; }
    }

    @media (prefers-reduced-motion: reduce) {
      .card { transition: none; }
    }
  </style>
</head>

<body>

  <div class="card" id="loginCard">
    <div class="card-header">
      <p class="eyebrow">secret by zax</p>
      <h1 class="card-title">masuk dulu,<br><em>baru boleh lihat.</em></h1>
    </div>

    <form id="loginForm" class="login_form" novalidate>
      <div class="field">
        <input
          type="text"
          id="username"
          placeholder="username"
          autocomplete="off"
          spellcheck="false"
        />
      </div>

      <div class="field">
        <input
          type="password"
          id="password"
          placeholder="password"
        />
        <button type="button" class="toggle-pw" id="togglePw" aria-label="Tampilkan password">👁</button>
      </div>

      <div class="form-error" id="formError">username atau password salah.</div>

      <button type="submit" class="btn-submit" id="loginBtn">masuk →</button>
    </form>

    <p class="card-footer">hanya untuk yang <span>tahu</span> ✦</p>

    <div class="hint-wrap">
      <div class="hint-container">
        <button class="hint-trigger" id="hintTrigger">butuh bantuan? →</button>
        <div class="hint-popover" id="hintPopover">
          <div class="hint-popover-label">info login</div>
          <div class="hint-row" data-field="username" data-value="zaxganteng">
            <div class="hint-row-left">
              <span class="hint-row-type">username</span>
              <span class="hint-row-value">zaxganteng</span>
            </div>
            <span class="hint-copy-icon">⎘</span>
          </div>
          <div class="hint-row" data-field="password" data-value="ayamcoding">
            <div class="hint-row-left">
              <span class="hint-row-type">password</span>
              <span class="hint-row-value">ayamcoding</span>
            </div>
            <span class="hint-copy-icon">⎘</span>
          </div>
          <div class="hint-arrow"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="copy-toast" id="copyToast"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.5/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="./scripts/index.js"></script>

</body>
</html>
